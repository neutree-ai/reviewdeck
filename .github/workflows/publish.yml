name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in packages/reviewdeck packages/reviewdeck-server packages/reviewdeck-ui; do
            PKG_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('$pkg/package.json', 'utf8')).version")"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "Version mismatch in $pkg: tag=$TAG_VERSION pkg=$PKG_VERSION"
              exit 1
            fi
          done

      - run: npm ci

      - run: npm test

      - run: npm run build

      - run: npm publish -w packages/reviewdeck-ui --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish -w packages/reviewdeck --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish -w packages/reviewdeck-server --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
